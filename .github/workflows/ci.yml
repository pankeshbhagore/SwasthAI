name: SwasthAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run triage engine tests
        working-directory: ./backend
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/swasthai_test
          JWT_SECRET: test_secret_key_for_ci
          NODE_ENV: test

  # ── ML Service Tests ───────────────────────────────────────────
  ml-service-test:
    name: ML Service Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/services/ml-service/requirements.txt
      
      - name: Install ML dependencies
        working-directory: ./backend/services/ml-service
        run: pip install -r requirements.txt
      
      - name: Train and test ML models
        working-directory: ./backend/services/ml-service
        run: python -c "from ml_server import ml; ml.train(); print('✅ ML models trained successfully')"
      
      - name: Test health endpoint
        working-directory: ./backend/services/ml-service
        run: |
          python ml_server.py &
          sleep 5
          curl -f http://localhost:5001/health || exit 1
          echo "✅ ML service health check passed"

  # ── Frontend Build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          REACT_APP_API_URL: https://api.swasthai.vercel.app/api
          REACT_APP_APP_NAME: SwasthAI

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build/

  # ── Docker Build ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build backend Docker image
        run: docker build -t swasthai-backend ./backend
      
      - name: Build frontend Docker image
        run: docker build -t swasthai-frontend ./frontend
      
      - name: Build ML service Docker image
        run: docker build -t swasthai-ml ./backend/services/ml-service

  # ── Deploy to Vercel (main branch only) ───────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
